<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfect Organic Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
.card { background: #1a1d2e; border-radius: 16px; padding: 40px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
p { color: #888; font-size: 14px; margin-bottom: 28px; }
input { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #2d3250; border-radius: 10px; color: #fff; font-size: 15px; outline: none; margin-bottom: 16px; }
input:focus { border-color: #4f8ef7; }
button { width: 100%; padding: 13px; background: #4f8ef7; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
button:hover { background: #3a7de0; }
.error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Perfect Organic Bot</h1>
  <p>Панель управления</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Пароль" autofocus>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
